name: Deploy to Kubernetes

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Midden
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/Midden/Dockerfile
          push: true
          tags: |
            crymall/midden-client:${{ github.sha }}
            crymall/midden-client:latest
          build-args: |
            VITE_CANTEEN_URL=${{ vars.PROD_CANTEEN_URL }}

      - name: Build and push Canteen
        uses: docker/build-push-action@v5
        with:
          context: .
          file: apps/Canteen/Dockerfile
          push: true
          tags: |
            crymall/canteen-client:${{ github.sha }}
            crymall/canteen-client:latest
          build-args: |
            VITE_MIDDEN_URL=${{ vars.PROD_MIDDEN_URL }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Apply Manifests
        run: |
          kubectl apply -f k8s/midden-deployment.yaml
          kubectl apply -f k8s/canteen-deployment.yaml
          kubectl apply -f k8s/ingress.yaml

      - name: Update Deployments with new SHA
        run: |
          kubectl set image deployment/midden-client-deployment midden-client=crymall/midden-client:${{ github.sha }}
          kubectl set image deployment/canteen-client-deployment canteen-client=crymall/canteen-client:${{ github.sha }}