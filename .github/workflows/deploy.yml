name: Deploy Workspace

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
    - name: Install dependencies
      run: npm ci
    - name: Run tests
      run: npm test

  build-and-deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Midden
      uses: docker/build-push-action@v4
      with:
        context: .
        file: apps/Midden/Dockerfile
        push: true
        tags: |
          crymall/midden-client:${{ github.sha }}
          crymall/midden-client:latest
        platforms: linux/amd64
        build-args: |
          VITE_CANTEEN_URL=${{ vars.PROD_CANTEEN_URL }}

    - name: Build and push Canteen
      uses: docker/build-push-action@v4
      with:
        context: .
        file: apps/Canteen/Dockerfile
        push: true
        tags: |
          crymall/canteen-client:${{ github.sha }}
          crymall/canteen-client:latest
        platforms: linux/amd64
        build-args: |
          VITE_MIDDEN_URL=${{ vars.PROD_MIDDEN_URL }}

    - name: Set up kubectl
      uses: azure/setup-kubectl@v3

    - name: Activate Kubeconfig
      run: |
        mkdir -p $HOME/.kube
        echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config
        chmod 600 $HOME/.kube/config

    - name: Deploy to Kubernetes
      run: |
        sed -i 's|crymall/midden-client:latest|crymall/midden-client:${{ github.sha }}|g' k8s/midden-deployment.yaml
        sed -i 's|crymall/canteen-client:latest|crymall/canteen-client:${{ github.sha }}|g' k8s/canteen-deployment.yaml
        
        kubectl apply -f k8s/
        
        kubectl rollout status deployment/midden-client
        kubectl rollout status deployment/canteen-client